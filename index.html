<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NW7 JRPG Map Renderer</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="game-shell">
      <header class="top-bar">
        <div>
          <h1>NW7 JRPG</h1>
          <p>RPG Maker MV Karten-Renderer</p>
        </div>
        <div id="status" class="status">Lade Karte...</div>
      </header>

      <section class="viewport-wrap" aria-label="Spielansicht">
        <canvas id="game" width="960" height="640"></canvas>
        <div id="dialog" class="dialog hidden">Hallo! Ich bin ein Test-NPC.</div>
      </section>

      <nav class="touch-pad" aria-label="Touch-Steuerung">
        <button data-dir="up" aria-label="Nach oben">↑</button>
        <button data-dir="left" aria-label="Nach links">←</button>
        <button data-dir="down" aria-label="Nach unten">↓</button>
        <button data-dir="right" aria-label="Nach rechts">→</button>
      </nav>
    </main>

    <script src="game.js"></script>
  </body>
</html>
